<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wages Of Sin</title>

    <link rel="stylesheet" href="../CSS/home.css">
</head>
<body>

    <section id="main-section">
        
        <div id="game-image">
            <header id="header">
                <div id="franchise-area">
                    <img id="franchise-logo" alt="logo" src="../IMGS/Sin-remnant.svg">
    
                    <p id="franchise-name">WAGES OF SIN</p>
                </div>
    
                <div id="redirect-area">
                    <a id="homepage" class="redirect" href="">HOME</a>
                    <a id="gameplay" class="redirect" href="">GAMEPLAY</a>
                    <a id="lore" class="redirect" href="">LORE</a>
                    <a id="demo" class="redirect" href="">ACADEMIC DEMO</a>
                </div>

            </header>


            <section id="intro-section">
    
                <div id="game-title-div">
                    <h1 id="title" class="page-text">WAGES OF SIN</h1>
                    <h3 id="subtitle" class="page-text">THREE REALMS</h3>
                </div>
    
                <div id="options-box">
                    <a id="lore-button" class="option">
                        EXPLORE THE WORLD
                    </a>
    
                    <a id="trailer-button" class="option"> <img id="play-image" src="../IMGS/play-solid-full.svg" alt="play-img"> WATCH TRAILER</a>
                </div>
    
            </section>

        </div>

        <section id="info-section">
            <div id="exploration-div">

            </div>

            <div id="progression-div">

            </div>

            <div id="combat-div">

            </div>

        </section>

        <div id="divisor">
            <img src="" alt="line">
            <img src="" alt="asterisk">
            <img src="" alt="line">
        </div>

        <secdtion id="games-section">

            <h2 id="games-apresentation">THE WHOLE UNIVERSE</h2>

            <div id="games-div">

                <div id="hells-circles">
                    <img src="" alt="game-img" class="game-cover">
                    
                    <div id="hells-circles-info" class="games-info">

                    </div>

                </div>


                <div id="the-last-penance">
                    <img src="" alt="game-img" class="game-cover">
                    
                    <div id="TLP-info" class="games-info">

                    </div>
                    
                </div>


                <div id="fragmented-paradise">
                    <img src="" alt="game-img" class="game-cover">
                    
                    <div id="fragmented-paradise-info" class="games-info">

                    </div>
                    
                </div>

            </div>
    
        </section>

        <a href="" id="lore-page-link">DISCOVER THE FULL LORE</a>
    
    </section>

</body>
</html>
